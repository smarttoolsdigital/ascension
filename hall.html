<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Ascension — The Training Hall</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root{--bone:#ece7dc;--dim:#8a8578;--gold:#d4af37;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#05050a;color:var(--bone);
    font-family:'EB Garamond',Georgia,serif;-webkit-user-select:none;user-select:none;}
  canvas{display:block;}
  /* The only DOM that survives: boot, the white flash, Lumen's line, a vignette. No panels. */
  #boot{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 42%,#141018,#050506 70%);transition:opacity .8s;}
  #boot .s{font-family:'Cinzel';font-weight:700;letter-spacing:.24em;font-size:clamp(22px,6.5vw,40px);color:var(--gold);
    text-shadow:0 0 26px rgba(212,175,55,.32);cursor:pointer;}
  #boot .s.on{animation:breathe 3.4s ease-in-out infinite;}
  #boot .u{margin-top:11px;color:var(--dim);letter-spacing:.32em;text-transform:uppercase;font-size:10px;}
  #boot .b{margin-top:26px;width:min(240px,58vw);height:2px;background:rgba(212,175,55,.15);border-radius:2px;overflow:hidden;}
  #boot .b i{display:block;height:100%;width:0;background:linear-gradient(90deg,transparent,var(--gold));transition:width .3s;}
  /* not a button — a quiet invitation. The world starts when you touch it. */
  #boot .tap{margin-top:34px;font-family:'Cinzel';letter-spacing:.34em;text-transform:uppercase;font-size:11px;
    color:rgba(212,175,55,.85);opacity:0;transition:opacity 1s;cursor:pointer;}
  #boot .tap.on{opacity:1;animation:breathe 3.4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.4}50%{opacity:.85}}
  #flash{position:fixed;inset:0;background:#fff;z-index:50;pointer-events:none;opacity:0;}
  #vig{position:fixed;inset:0;z-index:20;pointer-events:none;
    box-shadow:inset 0 0 180px 40px rgba(0,0,0,.72);
    background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(0,0,0,.28) 100%);}
  #grain{position:fixed;inset:0;z-index:21;pointer-events:none;opacity:.055;mix-blend-mode:overlay;}
  /* Lumen speaks — a line in the dark, then gone. The one text the world allows. */
  #sub{position:fixed;left:50%;transform:translateX(-50%);bottom:11vh;z-index:30;pointer-events:none;
    text-align:center;max-width:78vw;font-size:clamp(16px,4.4vw,21px);line-height:1.45;font-style:italic;
    color:#f2ead8;text-shadow:0 2px 22px rgba(0,0,0,.95),0 0 40px rgba(0,0,0,.8);opacity:0;transition:opacity 1.1s;}
  #err{position:fixed;inset:0;z-index:99;display:none;align-items:center;justify-content:center;text-align:center;
    padding:32px;background:#05050a;font-style:italic;color:var(--dim);}
</style>
</head>
<body>
<div id="app"></div>
<div id="vig"></div>
<canvas id="grain"></canvas>
<div id="sub"></div>
<div id="flash"></div>
<div id="boot">
  <div class="s">ASCENSION</div><div class="u">The Training Hall</div>
  <div class="b"><i></i></div>
</div>
<div id="err">The hall could not be reached.</div>

<script type="module" src="./store-bridge.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";
const bootEl=document.getElementById('boot'), bar=bootEl.querySelector('.b i');
let bp=0; const bt=setInterval(()=>{bp=Math.min(bp+Math.random()*20,90);bar.style.width=bp+'%';},140);
if(typeof THREE==='undefined'){document.getElementById('err').style.display='flex';bootEl.style.display='none';return;}
const TAU=Math.PI*2, rnd=(a,b)=>a+Math.random()*(b-a), clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t, ease=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2, easeOut=t=>1-Math.pow(1-t,3);

/* ============================================================ STATE */
const KEY='ascension.hall.v1';
const DEF={sessions:0,streak:0,lastDay:null,xp:0,armor:{},weights:{},recovery:[],
  lastVisit:null,lastVisitPrev:null,firstEver:true,directive:null};
let S=(()=>{try{const r=localStorage.getItem(KEY);if(r)return Object.assign({},DEF,JSON.parse(r));}catch(e){}return JSON.parse(JSON.stringify(DEF));})();
const save=()=>{try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}};
const dayKey=()=>{const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();};
S.lastVisitPrev=S.lastVisit; S.lastVisit=Date.now(); save();

/* THE ONE INTELLIGENCE — a compact twin, honestly computed */
const TWIN={burnout:.3,motivation:.5,load:.4,decision:.5};
function computeTwin(){
  const r=S.recovery[0], fresh=r&&(Date.now()-r.ts)<3*864e5;
  const sleep=fresh?clamp((r.sleep-4)/5,0,1):0.5, ready=fresh?clamp((r.readiness-1)/9,0,1):0.5, mood=fresh?clamp((r.mood-1)/9,0,1):0.5;
  const streak=clamp(S.streak/14,0,1);
  const debt=(sleep<0.4?1:0), low=(ready<0.35?1:0);
  TWIN.burnout=clamp(.44*(1-sleep)+.28*(1-ready)+.15*debt+.13*low-.12*mood,0,1);
  TWIN.motivation=clamp(.42*streak+.22*mood+.2*(1-TWIN.burnout),0,1);
  TWIN.load=clamp(.5*(1-sleep)+.3*TWIN.burnout,0,1);
  TWIN.decision=clamp(.4*sleep+.3*(1-TWIN.load)+.3*TWIN.motivation,0,1);
  return TWIN;
}
computeTwin();
const depleted=()=>TWIN.burnout>0.6;

/* THE TRIAL (from the real plan) */
const TRIALS=[
 {name:'The Anterior Trial',focus:'Shoulders · Quads · Chest',ex:[
   {n:'Goblet Squat',s:5,r:'10–20',w:25,cue:'DB at chest. Three seconds down. Pause in the hole.'},
   {n:'DB Floor Press',s:5,r:'8–15',w:30,cue:'Slow eccentric. Own the lowering.'},
   {n:'Standing One-Arm Press',s:5,r:'8–12',w:20,cue:'Core tight. No lean-back. Hold the top.'},
   {n:'Lateral Raise',s:4,r:'12–25',w:15,cue:'Slight elbow bend. Slow, or it becomes a windmill.'},
   {n:'Weighted Sit-ups',s:2,r:'12–20',w:20,cue:'DB on chest. Leave it here.'}]},
 {name:'The Posterior Trial',focus:'Hamstrings · Back · Glutes',ex:[
   {n:'Romanian Deadlift',s:4,r:'10–20',w:35,cue:'Hips back. Flat back. Protect the spine.'},
   {n:'Bent-Over Row',s:4,r:'10–20',w:35,cue:'Squeeze a pencil between the blades.'},
   {n:'Rear Delt Fly',s:3,r:'12–25',w:10,cue:'Slight hinge. Strict. Posture armor.'},
   {n:'Glute Bridge',s:3,r:'12–25',w:35,cue:'Squeeze like cracking a walnut.'},
   {n:'Biceps Burnout',s:3,r:'to failure',w:25,cue:'Last set until it lies to you.'}]},
 {name:'The Sanctuary',focus:'Mobility · Recovery',rec:true,ex:[
   {n:'Mobility Flow',s:1,r:'10–20 min',w:0,cue:'Cat-cow. Deep squat hold. Wake the joints.'},
   {n:'Hip & Glute Reset',s:1,r:'flow',w:0,cue:'90/90. Pigeon. Couch stretch.'},
   {n:'Incline Walk',s:1,r:'20–40 min',w:0,cue:'Zone two. Circulation, not ego.'}]},
];
const trial=()=>TRIALS[S.sessions%TRIALS.length];
const ARMOR_NAMES={pauldrons:'Pauldrons',breastplate:'Breastplate',greaves:'Greaves',gauntlets:'Gauntlets',girdle:'Girdle',helm:'Helm'};
function pieceFor(n){n=n.toLowerCase();
  if(/delt|lateral|arnold|shoulder|overhead|shrug|one-?arm press|standing.*press/.test(n))return 'pauldrons';
  if(/floor press|bench|chest|pullover|push-?up/.test(n))return 'breastplate';
  if(/squat|lunge|bridge|rdl|deadlift|calf|leg/.test(n))return 'greaves';
  if(/bicep|tricep|curl/.test(n))return 'gauntlets';
  if(/sit-?up|core|plank/.test(n))return 'girdle';
  if(/row|back|pull/.test(n))return 'helm';
  return null;}

/* ============================================================ RENDERER (perf first) */
const scene=new THREE.Scene();
const renderer=new THREE.WebGLRenderer({antialias:window.devicePixelRatio<2,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.6));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0;
document.getElementById('app').appendChild(renderer.domElement);
const camera=new THREE.PerspectiveCamera(58,window.innerWidth/window.innerHeight,0.08,320);
scene.fog=new THREE.FogExp2(0xa89076,0.0088);

/* ============================================================ MESSY MATERIALS */
function cv(n){const c=document.createElement('canvas');c.width=c.height=n||256;return c;}
function T(c,rep){const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;if(rep)t.repeat.set(rep,rep);
  t.anisotropy=Math.min(4,renderer.capabilities?renderer.capabilities.getMaxAnisotropy():4);return t;}
function noise(x,n,base,amt,size){for(let i=0;i<n;i++){const c=new THREE.Color(base).offsetHSL(0,0,(Math.random()-.5)*amt);
  x.globalAlpha=.14+Math.random()*.4;x.fillStyle='#'+c.getHexString();
  x.fillRect(Math.random()*size,Math.random()*size,Math.random()*4+1,Math.random()*4+1);}x.globalAlpha=1;}
// Stone: chipped, cracked, mossy, damp
function stoneCanvas(base,moss){const c=cv(256),x=c.getContext('2d');
  x.fillStyle='#'+new THREE.Color(base).getHexString();x.fillRect(0,0,256,256);
  noise(x,3600,base,.20,256);
  // mortar joints — flagstones
  x.strokeStyle='rgba(0,0,0,.42)';x.lineWidth=3;
  for(let r=0;r<4;r++){const y=r*64+((r%2)?0:0);x.beginPath();x.moveTo(0,y);x.lineTo(256,y);x.stroke();
    for(let k=0;k<4;k++){const off=(r%2)?32:0;const px=k*64+off;x.beginPath();x.moveTo(px,y);x.lineTo(px,y+64);x.stroke();}}
  // cracks
  for(let i=0;i<16;i++){x.strokeStyle='rgba(0,0,0,'+(.16+Math.random()*.3)+')';x.lineWidth=Math.random()*1.6+.3;
    let px=Math.random()*256,py=Math.random()*256;x.beginPath();x.moveTo(px,py);
    for(let k=0;k<5;k++){px+=(Math.random()-.5)*34;py+=(Math.random()-.5)*34;x.lineTo(px,py);}x.stroke();}
  // chipped highlights on edges
  for(let i=0;i<40;i++){x.fillStyle='rgba(255,250,235,'+(Math.random()*.12)+')';x.fillRect(Math.random()*256,Math.random()*256,Math.random()*7,2);}
  // moss in the joints and damp corners
  if(moss)for(let i=0;i<420;i++){const g=new THREE.Color(0x3f5a2c).offsetHSL((Math.random()-.5)*.06,0,(Math.random()-.5)*.22);
    x.globalAlpha=.10+Math.random()*.4;x.fillStyle='#'+g.getHexString();
    const gx=Math.random()*256,gy=Math.round(Math.random()*4)*64+(Math.random()-.5)*9;
    x.beginPath();x.arc(gx,gy,Math.random()*4+.6,0,TAU);x.fill();}
  x.globalAlpha=1;
  // dirt streaks
  for(let i=0;i<26;i++){x.fillStyle='rgba(30,22,14,'+(Math.random()*.16)+')';x.fillRect(Math.random()*256,Math.random()*256,Math.random()*3+1,Math.random()*60);}
  return c;}
// A roughness map: puddles + polished-by-use patches are smoother (dark = shiny)
function wetCanvas(){const c=cv(256),x=c.getContext('2d');x.fillStyle='#e8e8e8';x.fillRect(0,0,256,256);
  for(let i=0;i<7;i++){const px=Math.random()*256,py=Math.random()*256,r=rnd(14,42);
    const g=x.createRadialGradient(px,py,1,px,py,r);g.addColorStop(0,'rgba(30,30,30,1)');g.addColorStop(.7,'rgba(120,120,120,.8)');g.addColorStop(1,'rgba(232,232,232,0)');
    x.fillStyle=g;x.beginPath();x.arc(px,py,r,0,TAU);x.fill();}
  return c;}
function woodCanvas(base){const c=cv(256),x=c.getContext('2d');
  x.fillStyle='#'+new THREE.Color(base).getHexString();x.fillRect(0,0,256,256);
  for(let i=0;i<70;i++){const y=i*3.8+Math.random()*2;x.strokeStyle='rgba(0,0,0,'+(.05+Math.random()*.2)+')';x.lineWidth=Math.random()*2.2+.2;
    x.beginPath();for(let px=0;px<=256;px+=10)x.lineTo(px,y+Math.sin(px*.05+i)*2.6);x.stroke();}
  for(let i=0;i<8;i++){x.strokeStyle='rgba(0,0,0,.34)';x.lineWidth=1.6;x.beginPath();x.ellipse(Math.random()*256,Math.random()*256,5+Math.random()*5,2.4,0,0,TAU);x.stroke();}
  // worn, pale edges where hands go
  for(let i=0;i<30;i++){x.fillStyle='rgba(230,214,180,'+(Math.random()*.14)+')';x.fillRect(Math.random()*256,Math.random()*256,Math.random()*22,Math.random()*4);}
  // dark stains
  for(let i=0;i<14;i++){x.fillStyle='rgba(20,12,6,'+(Math.random()*.2)+')';x.beginPath();x.arc(Math.random()*256,Math.random()*256,Math.random()*13+3,0,TAU);x.fill();}
  return c;}
function ironCanvas(base){const c=cv(256),x=c.getContext('2d');
  x.fillStyle='#'+new THREE.Color(base).getHexString();x.fillRect(0,0,256,256);
  for(let i=0;i<600;i++){x.strokeStyle='rgba(255,255,255,'+(Math.random()*.07)+')';x.lineWidth=Math.random();
    const y=Math.random()*256;x.beginPath();x.moveTo(0,y);x.lineTo(256,y+(Math.random()-.5)*4);x.stroke();}
  // rust blooms
  for(let i=0;i<24;i++){const px=Math.random()*256,py=Math.random()*256,r=rnd(4,18);
    const g=x.createRadialGradient(px,py,1,px,py,r);g.addColorStop(0,'rgba(126,62,26,.55)');g.addColorStop(1,'rgba(126,62,26,0)');
    x.fillStyle=g;x.beginPath();x.arc(px,py,r,0,TAU);x.fill();}
  // deep scratches
  for(let i=0;i<34;i++){x.strokeStyle='rgba(0,0,0,'+(.14+Math.random()*.3)+')';x.lineWidth=Math.random()*1.7+.3;
    const sx=Math.random()*256,sy=Math.random()*256;x.beginPath();x.moveTo(sx,sy);x.lineTo(sx+(Math.random()-.5)*54,sy+(Math.random()-.5)*16);x.stroke();}
  return c;}
function skinCanvas(base){const c=cv(128),x=c.getContext('2d');
  x.fillStyle='#'+new THREE.Color(base).getHexString();x.fillRect(0,0,128,128);noise(x,2200,base,.10,128);return c;}
function clothCanvas(base){const c=cv(128),x=c.getContext('2d');
  x.fillStyle='#'+new THREE.Color(base).getHexString();x.fillRect(0,0,128,128);
  for(let i=0;i<128;i+=2){x.strokeStyle='rgba(0,0,0,.06)';x.beginPath();x.moveTo(0,i);x.lineTo(128,i);x.stroke();
    x.strokeStyle='rgba(255,255,255,.03)';x.beginPath();x.moveTo(i,0);x.lineTo(i,128);x.stroke();}
  for(let i=0;i<120;i++){x.fillStyle='rgba(0,0,0,'+(Math.random()*.13)+')';x.fillRect(Math.random()*128,Math.random()*128,Math.random()*6,Math.random()*2);}
  return c;}

const texFloor=T(stoneCanvas(0x6e6a62,true),4), texWet=T(wetCanvas(),4);
const texWall=T(stoneCanvas(0x5d5a55,true),3);
const texWood=T(woodCanvas(0x6d5030),2);
const texIron=T(ironCanvas(0x585a60),1);
const M_FLOOR=new THREE.MeshStandardMaterial({map:texFloor,bumpMap:texFloor,bumpScale:.055,roughnessMap:texWet,roughness:.95,metalness:.02,color:0xffffff});
const M_WALL =new THREE.MeshStandardMaterial({map:texWall,bumpMap:texWall,bumpScale:.07,roughness:.98,color:0xffffff});
const M_WOOD =new THREE.MeshStandardMaterial({map:texWood,bumpMap:texWood,bumpScale:.05,roughness:.92,color:0xffffff});
const M_IRON =new THREE.MeshStandardMaterial({map:texIron,bumpMap:texIron,bumpScale:.03,roughness:.46,metalness:.78,color:0xffffff});
const M_STEEL=new THREE.MeshStandardMaterial({map:texIron,roughness:.3,metalness:.9,color:0xa9aeb6});

/* ============================================================ LIGHTS (few, cheap, motivated) */
const hemi=new THREE.HemisphereLight(0x93a9c8,0x241c14,.34); scene.add(hemi);
const sun=new THREE.DirectionalLight(0xffcaa0,2.5);
sun.position.set(-20,11,22); sun.castShadow=true;   // low and warm — a sunrise, not high noon
sun.shadow.mapSize.set(1024,1024); sun.shadow.camera.near=1; sun.shadow.camera.far=70;
const sc=18; Object.assign(sun.shadow.camera,{left:-sc,right:sc,top:sc,bottom:-sc}); sun.shadow.bias=-0.0006;
scene.add(sun);
const forgeLight=new THREE.PointLight(0xff7a2a,0,16); forgeLight.position.set(4.6,1.4,-3.4); scene.add(forgeLight);
const altarLight=new THREE.PointLight(0xd4af37,0,10); altarLight.position.set(4.4,1.5,-1.2); scene.add(altarLight);

/* ============================================================ THE VALLEY (the wow) */
const skyGeo=new THREE.SphereGeometry(200,24,16);
const skyMat=new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,fog:false,
  uniforms:{top:{value:new THREE.Color(0x27476e)},bot:{value:new THREE.Color(0xd8a06a)}},
  vertexShader:'varying float h;void main(){h=normalize(position).y;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
  fragmentShader:'varying float h;uniform vec3 top;uniform vec3 bot;void main(){gl_FragColor=vec4(mix(bot,top,clamp(h*.8+.32,0.,1.)),1.);}'});
skyMat.uniforms.bot.value=new THREE.Color(0xd8a06a);
scene.add(new THREE.Mesh(skyGeo,skyMat));
// The hall's light matches the real hour you open it — dawn amber, midday gold, dusk fire, night moon.
(function(){const hr=new Date().getHours();let col,ele,warm,top;
  if(hr<8){col=0xffb26b;ele=8;warm=0xf0b070;top=0x3a4a6e;}
  else if(hr<12){col=0xffd9a8;ele=16;warm=0xe8b47a;top=0x2f4a72;}
  else if(hr<17){col=0xfff0d6;ele=23;warm=0xcdb892;top=0x2b4a78;}
  else if(hr<20){col=0xff9a54;ele=9;warm=0xe8945a;top=0x2a3a60;}
  else{col=0x9fb0d8;ele=14;warm=0x5a6a92;top=0x141e38;}
  sun.color.setHex(col); sun.position.set(-20,ele,22);
  skyMat.uniforms.bot.value.setHex(warm); skyMat.uniforms.top.value.setHex(top);})();

// ground: big, cheap, one draw call
const groundGeo=new THREE.PlaneGeometry(300,300,40,40); groundGeo.rotateX(-Math.PI/2);
{const p=groundGeo.attributes.position;
 for(let i=0;i<p.count;i++){const x=p.getX(i),z=p.getZ(i),d=Math.hypot(x,z);
   let y=Math.sin(x*.045)*Math.cos(z*.05)*1.5+Math.sin(d*.07)*.9;
   if(d<26)y*=Math.max(0,(d-9)/17); p.setY(i,y);} groundGeo.computeVertexNormals();}
const grassC=cv(256);{const x=grassC.getContext('2d');x.fillStyle='#3d4a2a';x.fillRect(0,0,256,256);
  noise(x,5200,0x3d4a2a,.30,256);
  for(let i=0;i<300;i++){x.strokeStyle='rgba(90,110,60,'+(Math.random()*.4)+')';x.lineWidth=1;
    const px=Math.random()*256,py=Math.random()*256;x.beginPath();x.moveTo(px,py);x.lineTo(px+(Math.random()-.5)*4,py-Math.random()*6);x.stroke();}}
const ground=new THREE.Mesh(groundGeo,new THREE.MeshStandardMaterial({map:T(grassC,50),roughness:1,color:0x9aa27f}));
ground.receiveShadow=true; scene.add(ground);

// mountains — 1 merged-ish group, no shadows
const mtnMat=new THREE.MeshStandardMaterial({color:0x2b3444,roughness:1,flatShading:true,fog:true});
{const g=new THREE.Group();
 for(let i=0;i<26;i++){const a=i/26*TAU,r=rnd(105,135),h=rnd(26,62);
   const m=new THREE.Mesh(new THREE.ConeGeometry(rnd(20,36),h,4),mtnMat);
   m.position.set(Math.cos(a)*r,h/2-7,Math.sin(a)*r);m.rotation.y=rnd(0,TAU);g.add(m);} scene.add(g);}

// trees: InstancedMesh, one draw call each
const treeCount=90;
{const trunkG=new THREE.CylinderGeometry(.18,.32,3.6,5), trunkM=new THREE.MeshStandardMaterial({color:0x3a2c1e,roughness:1,flatShading:true});
 const crownG=new THREE.ConeGeometry(1.9,4.4,6), crownM=new THREE.MeshStandardMaterial({color:0x2c3d22,roughness:1,flatShading:true});
 const ti=new THREE.InstancedMesh(trunkG,trunkM,treeCount), ci=new THREE.InstancedMesh(crownG,crownM,treeCount);
 const d=new THREE.Object3D();
 for(let i=0;i<treeCount;i++){const a=rnd(0,TAU),r=rnd(20,95);const x=Math.cos(a)*r,z=Math.sin(a)*r;
   const sy=rnd(.8,1.5);
   d.position.set(x,1.8*sy-.4,z);d.scale.set(sy,sy,sy);d.rotation.set(0,rnd(0,TAU),0);d.updateMatrix();ti.setMatrixAt(i,d.matrix);
   d.position.set(x,3.4*sy,z);d.updateMatrix();ci.setMatrixAt(i,d.matrix);}
 ti.castShadow=ci.castShadow=false; scene.add(ti);scene.add(ci);}

// birds: one Points, animated on GPU

/* ============================================================ SURFACE UI — the interface IS an object */
function SurfaceUI(w,h,pw,ph){
  const c=cv(); c.width=w; c.height=h; const x=c.getContext('2d');
  const tex=new THREE.CanvasTexture(c); tex.anisotropy=4;
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(pw,ph),
    new THREE.MeshBasicMaterial({map:tex,transparent:true,fog:true}));
  const api={c,x,tex,mesh,regions:[],W:w,H:h,
    clear(){x.clearRect(0,0,w,h);api.regions=[];},
    commit(){tex.needsUpdate=true;},
    hit(u,v){const px=u*w,py=(1-v)*h;
      for(let i=api.regions.length-1;i>=0;i--){const r=api.regions[i];
        if(px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h){r.fn();return true;}}return false;},
    zone(rx,ry,rw,rh,fn){api.regions.push({x:rx,y:ry,w:rw,h:rh,fn});}};
  return api;
}
function roundRect(x,rx,ry,rw,rh,r){x.beginPath();x.moveTo(rx+r,ry);x.arcTo(rx+rw,ry,rx+rw,ry+rh,r);
  x.arcTo(rx+rw,ry+rh,rx,ry+rh,r);x.arcTo(rx,ry+rh,rx,ry,r);x.arcTo(rx,ry,rx+rw,ry,r);x.closePath();}
function wrap(x,text,cx,cy,maxW,lh){const words=String(text).split(' ');let line='',y=cy;
  for(const wd of words){const t=line?line+' '+wd:wd;
    if(x.measureText(t).width>maxW&&line){x.fillText(line,cx,y);line=wd;y+=lh;}else line=t;}
  if(line)x.fillText(line,cx,y);return y;}
// A control is not a button. It is a seal burned into the surface.
function seal(x,bx,by,bw,bh,label,dim){
  const g=x.createLinearGradient(0,by,0,by+bh); g.addColorStop(0,dim?'#1b150c':'#241708'); g.addColorStop(1,'#110f0a');
  x.fillStyle=g; x.fillRect(bx,by,bw,bh);
  x.strokeStyle=dim?'rgba(212,175,55,.28)':'rgba(212,175,55,.52)'; x.lineWidth=1.5; x.strokeRect(bx+6,by+6,bw-12,bh-12);
  x.strokeStyle='rgba(212,175,55,.16)'; x.lineWidth=1; x.strokeRect(bx+10,by+10,bw-20,bh-20);
  x.fillStyle=dim?'#b6a984':'#e6d4a6'; x.font='700 21px Cinzel, serif'; x.textAlign='center';
  x.fillText(label,bx+bw/2,by+bh/2+8);
}

  uniforms:{t:{value:0},op:{value:0}},
  vertexShader:`attribute float seed;uniform float t;varying float v;void main(){vec3 q=position;
    q.y+=mod(t*.12+seed,7.0)-3.5; q.x+=sin(t*.25+seed*3.)*.4; q.z+=cos(t*.2+seed*2.)*.4;
    v=.4+.6*sin(t*2.+seed*7.);
    vec4 mv=modelViewMatrix*vec4(q,1.);gl_PointSize=(34./-mv.z);gl_Position=projectionMatrix*mv;}`,
  fragmentShader:`uniform float op;varying float v;void main(){vec2 u=gl_PointCoord-.5;
    float a=smoothstep(.5,0.,length(u));gl_FragColor=vec4(1.,.94,.82,a*v*op);}`});
 const dust=new THREE.Points(g,m); dust.frustumCulled=false; hall.add(dust); window.__dust=m;}

/* ============================================================ CAMERA — you are standing here */
const cam={pos:new THREE.Vector3(0,2.4,42),look:new THREE.Vector3(0,3.2,0),
  tPos:new THREE.Vector3(0,2.4,42),tLook:new THREE.Vector3(0,3.2,0),speed:1.0,bob:0,walking:false};
const tilt={x:0,y:0,tx:0,ty:0};
window.addEventListener('deviceorientation',e=>{if(e.gamma==null)return;
  tilt.tx=clamp((e.gamma||0)/40,-1,1); tilt.ty=clamp(((e.beta||0)-48)/48,-1,1);},true);
window.addEventListener('mousemove',e=>{ if(!window.matchMedia||!window.matchMedia('(pointer:fine)').matches)return;
  tilt.tx=(e.clientX/window.innerWidth-.5)*1.2; tilt.ty=(e.clientY/window.innerHeight-.5)*.9;});

const SPOTS={
  valley:{pos:[0,2.4,42],look:[0,3.4,0],speed:.5},
  approach:{pos:[0,1.78,11.4],look:[0,2.6,0],speed:.55},
  hall:{pos:[0,1.75,-1.2],look:[0,2.2,-14],speed:.7},
  board:{pos:[0,2.05,-13.6],look:[0,2.45,-18.1],speed:1.0},
  altar:{pos:[3.0,1.75,-0.1],look:[4.6,1.85,-1.35],speed:1.0},
  rack:{pos:[-2.6,1.7,-3.6],look:[-4.6,1.0,-4.8],speed:1.0},
  stand:{pos:[1.6,1.75,-6.2],look:[3.1,1.4,-7.7],speed:1.0},
};
let place='valley', doorsOpen=0, doorsTarget=0;
function goto(p){ const s=SPOTS[p]; if(!s)return; place=p;
  cam.tPos.set(...s.pos); cam.tLook.set(...s.look); cam.speed=s.speed; cam.walking=true;
  setTimeout(()=>cam.walking=false,1400); }

/* ============================================================ INTERACTION — raycast the world */
const ray=new THREE.Raycaster(), ptr=new THREE.Vector2();
const doorHit=new THREE.Mesh(new THREE.BoxGeometry(4.4,5.4,.6),new THREE.MeshBasicMaterial({visible:false}));
doorHit.position.set(0,2.7,3); hall.add(doorHit);
renderer.domElement.addEventListener('pointerdown',ev=>{
  if(mode!=='live')return;
  ptr.x=(ev.clientX/window.innerWidth)*2-1; ptr.y=-(ev.clientY/window.innerHeight)*2+1;
  ray.setFromCamera(ptr,camera);
  // 1. surfaces that ARE interfaces
  if(place==='board'){ const h=ray.intersectObject(board.mesh,false);
    if(h.length&&h[0].uv){ if(board.hit(h[0].uv.x,h[0].uv.y))return; }
    goto('hall'); return; }
  if(place==='altar'){ const h=ray.intersectObject(altar.mesh,false);
    if(h.length&&h[0].uv){ if(altar.hit(h[0].uv.x,h[0].uv.y))return; }
    goto('hall'); return; }
  // 2. objects in the room
  const targets=[[doorHit,'door'],[board.mesh,'board'],[altarGrp,'altar'],[anvil,'anvil'],[rack,'rack'],[stand,'stand'],[lumen.G,'lumen']];
  const objs=targets.map(t=>t[0]);
  const hits=ray.intersectObjects(objs,true);
  if(hits.length){ let node=hits[0].object, found=null;
    while(node&&!found){ const m=targets.find(t=>t[0]===node); if(m)found=m[1]; node=node.parent; }
    if(found==='door'&&place==='approach'){ enterHall(); return; }
    if(found==='board'){ goto('board'); board.mesh.material.opacity=0; paintBoard(); sfx.thud(); return; }
    if(found==='altar'){ goto('altar'); paintAltar(); sfx.hum(); return; }
    if(found==='anvil'){ goto('hall'); say('The anvil is where the work becomes a thing you can hold.',4200); sfx.clank(); return; }
    if(found==='rack'){ goto('rack'); say('Forty pounds. It has never lied to you.',4200); return; }
    if(found==='stand'){ goto('stand');
      const n=Object.keys(S.armor).length;
      say(n?`${n} of six pieces. Each one is a day you did not skip.`:'Empty. It will not stay empty.',4600); return; }
    if(found==='lumen'){ lumenSpeak(); return; }
  }
  // 3. tapping nothing meaningful walks you back to the middle of the hall
  if(place!=='valley'&&place!=='approach'&&place!=='hall') goto('hall');
});
function lumenSpeak(){
  computeTwin(); const r=S.recovery[0];
  const away=S.lastVisitPrev?Math.floor((Date.now()-S.lastVisitPrev)/864e5):0;
  let line;
  if(TWIN.burnout>.6) line='You are burning something you cannot replace. Today I would not train.';
  else if(away>=3) line=`You were gone ${away} days. The hall was cold. It is warm now.`;
  else if(r&&r.sleep<6) line=`You slept ${r.sleep} hours. I would shorten today.`;
  else if(S.streak>=7) line=`${S.streak} days unbroken. Something is changing in you.`;
  else if(S.sessions===0) line='You have not lifted here yet. The board waits on the far wall.';
  else line='I am here. Ask the stone if you want the answer. Ask me if you want the truth.';
  say(line,5400); lumen.look={t:4};
}
function enterHall(){ doorsTarget=1; sfx.creak(); setTimeout(()=>{goto('hall');},900); }
function forgeFlash(){ forgeLight.intensity=6; setTimeout(()=>forgeLight.intensity=1.1,140); }

/* ============================================================ THE WOW — arrival */
function dayLine(){const t=trial();
  if(t.rec) return 'Recovery today. We restore. We do not break.';
  if(/Posterior/.test(t.name)) return 'Posterior day. Back and hamstrings.';
  return 'Anterior day. Shoulders and chest.';}
let mode='boot', t0=0, arrivalT=0;
const flash=document.getElementById('flash');
function begin(){
  bootEl.style.opacity='0'; setTimeout(()=>bootEl.style.display='none',800);
  ac(); startWind(); startForge(); startScore();
  flash.style.transition='none'; flash.style.opacity='1';
  mode='arrive'; arrivalT=0;
  camera.position.set(0,2.4,42); camera.lookAt(0,3.4,0);
  requestAnimationFrame(()=>{ flash.style.transition='opacity 3.4s cubic-bezier(.4,0,.2,1)'; flash.style.opacity='0'; });
}
bootEl.addEventListener('click',begin);

/* ============================================================ LOOP */
const clock=new THREE.Clock();
const grainC=document.getElementById('grain'), gx=grainC.getContext('2d');
function grain(){ const w=grainC.width=160,h=grainC.height=160; const d=gx.createImageData(w,h);
  for(let i=0;i<d.data.length;i+=4){const v=Math.random()*255;d.data[i]=d.data[i+1]=d.data[i+2]=v;d.data[i+3]=255;}
  gx.putImageData(d,0,0);}
let grainT=0;

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05), et=clock.elapsedTime;
  grainT+=dt; if(grainT>.05){grainT=0;grain();}

  if(window.__birds)window.__birds.uniforms.t.value=et;
  if(window.__dust){window.__dust.uniforms.t.value=et;
    window.__dust.uniforms.op.value=lerp(window.__dust.uniforms.op.value,(place==='valley'||place==='approach')?0:.85,dt*2);}
  anvil.userData.coals.material.color.setHSL(.045,1,.42+.1*Math.sin(et*4)+Math.random()*.03);
  forgeLight.intensity=lerp(forgeLight.intensity,(place==='valley'||place==='approach')?0:1.1*(.8+.2*Math.sin(et*6)),dt*3);
  altarLight.intensity=lerp(altarLight.intensity,place==='altar'?1.8:(place==='valley'||place==='approach'?0:.5),dt*2);
  shafts.children.forEach((s,i)=>s.material.opacity=.06+.035*Math.sin(et*.5+i));
  // the world draws the eye instead of a label: the board breathes until your first trial;
  // the doors breathe warm while you stand before them.
  const indoorsNow=(place!=='valley'&&place!=='approach');
  if(boardLamp) boardLamp.intensity=.85+(place==='board'?.9:0)+(indoorsNow&&S.sessions===0?.35+.35*Math.sin(et*2.1):0);
  if(typeof chandeliers!=='undefined') chandeliers.forEach((c,i)=>c.intensity=lerp(c.intensity,indoorsNow?.55+.12*Math.sin(et*6.5+i*2):0,dt*3));
  board.mesh.material.opacity = place==='board' ? Math.min(1,(board.mesh.material.opacity||0)+dt*1.7) : 1;
  doorGlow.intensity=lerp(doorGlow.intensity, place==='approach'?.5+.35*Math.sin(et*2.3):0, dt*3);
  {const indoors=indoorsNow;
   scene.fog.density=lerp(scene.fog.density,indoors?0.030:0.0088,dt*1.5);
   scene.fog.color.lerp(new THREE.Color(indoors?0x1b1a1e:0xa89076),dt*1.5);
   hemi.intensity=lerp(hemi.intensity,indoors?0.13:0.34,dt*1.5);
   renderer.toneMappingExposure=lerp(renderer.toneMappingExposure,indoors?1.22:1.0,dt*1.5);}

  // doors
  doorsOpen=lerp(doorsOpen,doorsTarget,dt*1.6);
  doorL.rotation.y=-doorsOpen*1.15; doorR.rotation.y=doorsOpen*1.15;

  /* ---- arrival cinematic ---- */
  if(mode==='arrive'){
    arrivalT+=dt;
    const k=Math.min(1,arrivalT/9);
    camera.position.set(Math.sin(arrivalT*.14)*1.2, 2.4+Math.sin(arrivalT*.3)*.12, 42-easeOut(k)*6.5);
    camera.lookAt(0,3.4-k*.6,0);
    // Lumen walks to you out of the valley
    if(arrivalT>1.6){
      const target=new THREE.Vector3(camera.position.x,0,camera.position.z-4.6);
      const d=lumen.G.position.distanceTo(target);
      if(d>0.2){ const dir=target.clone().sub(lumen.G.position).normalize();
        lumen.G.position.addScaledVector(dir,Math.min(d,1.35*dt));
        lookAt(lumen,new THREE.Vector3(camera.position.x,0,camera.position.z),dt,3);
        lumen.phase+=dt*6.2; walkPose(lumen,lumen.phase,.5);
        if(Math.sin(lumen.phase)*Math.sin(lumen.phase-dt*6.2)<0) sfx.step();
      } else { idlePose(lumen,et); lookAt(lumen,camera.position,dt,2.4);
        if(!lumen.greeted){ lumen.greeted=true;
          const away=S.lastVisitPrev?Math.floor((Date.now()-S.lastVisitPrev)/864e5):0;
          let l = depleted() ? 'You look emptied out. Come in anyway. We will not train.'
                : away>=3 ? `You were gone ${away} days. I kept the fire.`
                : dayLine();
          S.firstEver=false; save(); say(l,6000);
          doorsTarget=1; sfx.creak();                       // the doors are already opening for you
          setTimeout(()=>{ mode='live'; goto('hall'); },2600);
        }}
    }
    blink(lumen,dt,false); sway(lumen,et,.5);
    lumenLight.position.copy(lumen.G.position).add(new THREE.Vector3(0,1.8,0));
    lumenLight.intensity=.7;
    renderer.render(scene,camera); return;
  }
  if(mode!=='live'){ renderer.render(scene,camera); return; }

  /* ---- camera: you are standing, breathing, looking ---- */
  tilt.x+=(tilt.tx-tilt.x)*Math.min(1,dt*3); tilt.y+=(tilt.ty-tilt.y)*Math.min(1,dt*3);
  cam.pos.lerp(cam.tPos,Math.min(1,dt*cam.speed*1.5));
  cam.look.lerp(cam.tLook,Math.min(1,dt*cam.speed*1.8));
  cam.bob+=dt*(cam.walking?7.5:1.05);
  const bobY=(cam.walking?.045:.012)*Math.sin(cam.bob);
  const bobX=(cam.walking?.028:.008)*Math.sin(cam.bob*.5);
  camera.position.set(cam.pos.x+bobX+tilt.x*.30, cam.pos.y+bobY-tilt.y*.16, cam.pos.z);
  const lk=cam.look.clone(); lk.x+=tilt.x*1.5; lk.y+=-tilt.y*1.1;
  camera.lookAt(lk);
  camera.rotation.z=Math.sin(cam.bob*.5)*.0035+tilt.x*.012;
  {const sb=Math.sin(cam.bob)>.985; if(cam.walking&&sb&&!cam.stepL)sfx.step(); cam.stepL=sb;}

  /* ---- Lumen lives in the room ---- */
  const inHall=(place!=='valley'&&place!=='approach');
  const post=inHall?new THREE.Vector3(-1.9,0,-6.8):new THREE.Vector3(1.6,0,7.4);
  const d=lumen.G.position.distanceTo(post);
  if(d>0.28){ const dir=post.clone().sub(lumen.G.position).normalize();
    lumen.G.position.addScaledVector(dir,Math.min(d,1.5*dt));
    lumen.phase+=dt*6.4; walkPose(lumen,lumen.phase,.5); lookAt(lumen,post,dt,3);
  } else {
    idlePose(lumen,et);
    if(lumen.look&&lumen.look.t>0){ lumen.look.t-=dt; lookAt(lumen,camera.position,dt,2.2); }
    else { // intent: he watches the board, then you, then the fire
      const w=Math.sin(et*.11);
      const tgt = w>.4?board.mesh.getWorldPosition(new THREE.Vector3())
                : w<-.4?anvil.getWorldPosition(new THREE.Vector3())
                : camera.position;
      lookAt(lumen,tgt,dt,.9);
    }
  }
  blink(lumen,dt,!!(lumen.look&&lumen.look.t>0));
  sway(lumen,et,inHall?.2:.6);
  lumenLight.position.copy(lumen.G.position).add(new THREE.Vector3(0,1.8,0));
  lumenLight.intensity=lerp(lumenLight.intensity,inHall?.6:.4,dt*2);

  /* ---- rest timer on the board ---- */
  if(boardState.rest>0){ boardState.restAcc=(boardState.restAcc||0)+dt;
    if(boardState.restAcc>=1){ boardState.restAcc=0; boardState.rest--;
      if(place==='board')paintBoard();
      if(boardState.rest===0&&place==='board') sfx.tick(); } }

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});

window.ASC={get mode(){return mode;},get place(){return place;},S,TWIN,computeTwin,
  board,altar,get boardState(){return boardState;},paintBoard,paintAltar,goto,trial,pieceFor,
  enterHall,finishTrial,lumen,camera,scene,renderer,say,localDirective};

/* first paint */
paintBoard(); paintAltar(); grain();
clearInterval(bt); bar.style.width='100%';
setTimeout(()=>bootEl.querySelector('.s').classList.add('on'),400);
animate();
})();
</script>
</body>
</html>
