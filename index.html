<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#0a0806" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ascension" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icon-180.png" />
<title>Ascension</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#0a0806;--panel:#141019;--bone:#e8ddca;--dim:#8a7d5a;--gold:#d8b25a;--crim:#a33a34;--line:rgba(216,178,90,.14)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{height:100%;background:var(--bg);color:var(--bone);font-family:'EB Garamond',Georgia,serif;overscroll-behavior:none}
  #app{max-width:560px;margin:0 auto;min-height:100%;padding:0 16px calc(env(safe-area-inset-bottom) + 84px);display:flex;flex-direction:column}
  .header{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 16px) 2px 14px}
  .brand{font-family:'Cinzel';font-weight:700;letter-spacing:.28em;font-size:16px;color:var(--bone)}
  .streak{font-size:15px;color:var(--dim)}.streak b{color:var(--gold);font-variant-numeric:tabular-nums}
  .view{flex:1;animation:fade .4s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

  .directive{background:linear-gradient(160deg,#1a1410,#100c14);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:16px}
  .dlabel{font-family:'Cinzel';font-size:10px;letter-spacing:.24em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
  .dtext{font-size:19px;color:#f2e7d0;line-height:1.35;margin-bottom:6px}
  .dwhy{font-size:14px;font-style:italic;color:#b3a685;line-height:1.45}

  .trialhead{margin:4px 2px 14px}
  .tname{font-family:'Cinzel';font-weight:700;font-size:22px;color:#efe4cd}
  .tfocus{font-style:italic;color:var(--dim);font-size:15px;margin-top:2px}

  .exrow{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px}
  .exmain{flex:1;min-width:0}
  .exname{font-size:17px;color:#e8dcc0}.exmeta{font-size:13px;color:var(--dim);margin:1px 0 6px}
  .dots{display:flex;gap:5px}.dot{width:9px;height:9px;border-radius:50%;border:1.5px solid #5a4f3a}.dot.on{background:var(--gold);border-color:var(--gold)}
  .exright{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .weight{display:flex;align-items:center;gap:8px}
  .wbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#0f0b08;color:var(--gold);font-size:20px;line-height:1}
  .wval{font-size:16px;color:#e8dcc0;font-variant-numeric:tabular-nums;min-width:52px;text-align:center}.wval i{font-style:normal;font-size:11px;color:var(--dim);margin-left:2px}
  .logbtn{padding:9px 16px;border-radius:10px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-family:'Cinzel';font-size:12px;letter-spacing:.08em}
  .logbtn:disabled{opacity:.4;border-color:var(--dim);color:var(--dim)}
  .logbtn.wide{width:100%;margin-top:10px}
  .complete{width:100%;margin-top:8px;padding:16px;border-radius:14px;border:none;background:linear-gradient(180deg,#e6c884,#c39a34);color:#1a140a;font-family:'Cinzel';font-weight:700;letter-spacing:.12em;font-size:14px}
  .complete:active{transform:scale(.99)}
  .donecard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;text-align:center;color:#d7cbae;font-style:italic;font-size:16px}

  .sectitle{font-family:'Cinzel';font-size:12px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin:14px 2px 10px}
  .sectitle.small{color:var(--dim)}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
  .stat b{display:block;font-family:'Cinzel';font-size:30px;color:var(--gold)}.stat span{font-size:12px;color:var(--dim);letter-spacing:.06em}
  .histrow{display:flex;justify-content:space-between;gap:8px;padding:11px 14px;background:var(--panel);border:1px solid var(--line);border-radius:11px;margin-bottom:7px;font-size:13px;color:#c9bd9e}
  .empty{color:var(--dim);font-style:italic;padding:20px 4px}

  .reccard label{display:flex;align-items:center;gap:12px;margin:9px 0;font-size:14px;color:#bcae90}
  .reccard label input{flex:1;accent-color:var(--gold)}.reccard label b{min-width:30px;text-align:right;color:var(--gold)}
  .datacard,.reccard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:8px}
  .databtns{display:flex;gap:8px;margin-top:12px}
  .warn{color:#e0a24a;font-size:13px;line-height:1.4}.ok{color:#8faf6a;font-size:13px}
  .hallbtn{display:block;text-align:center;text-decoration:none;padding:15px;border-radius:14px;border:1px solid var(--line);color:var(--gold);font-family:'Cinzel';letter-spacing:.1em;font-size:14px;background:linear-gradient(160deg,#161019,#0e0b12)}
  .fine{font-size:12px;color:var(--dim);font-style:italic;margin-top:8px;line-height:1.5}

  .nav{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:6px;padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);background:linear-gradient(#0a08060a,#0a0806 40%);backdrop-filter:blur(8px)}
  .nb{flex:1;max-width:150px;padding:11px;border:none;background:transparent;color:var(--dim);font-family:'Cinzel';font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .nb.on{color:var(--gold)}
  #toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 78px);transform:translateX(-50%) translateY(12px);background:#1a1410;border:1px solid var(--line);color:#e8dcc0;padding:11px 18px;border-radius:24px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:20;max-width:80vw;text-align:center}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  #boot{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:30;transition:opacity .6s;font-family:'Cinzel';letter-spacing:.3em;color:var(--gold);font-size:14px}
  #boot.gone{opacity:0;pointer-events:none}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<div id="boot">ASCENSION</div>
<script type="module" src="./app.js"></script>
</body>
</html>
