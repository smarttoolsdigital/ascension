<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#050403" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ascension" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icon-180.png" />
<title>Ascension</title>
<style>
:root{
  --bg:#050403;--black:#090705;--panel:#141019;--panel2:#1a1116;--bone:#efe4ce;--soft:#cdbf9c;
  --dim:#8f805c;--gold:#d8b25a;--gold2:#f0d37b;--line:rgba(216,178,90,.18);--green:#8faf6a;--red:#a3483d;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{min-height:100%;background:var(--bg);color:var(--bone);font-family:Georgia,'Times New Roman',serif;overscroll-behavior:none}
body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 15%,rgba(216,178,90,.10),transparent 28%),radial-gradient(circle at 80% 80%,rgba(95,59,37,.24),transparent 32%),linear-gradient(180deg,#050403,#090706 55%,#030202);pointer-events:none}
#app{position:relative;z-index:1;max-width:560px;margin:0 auto;min-height:100dvh;padding:calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 92px)}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.brand{letter-spacing:.32em;font-size:22px;font-weight:700;color:#f4ead8;text-shadow:0 0 20px rgba(216,178,90,.18)}.streak{color:var(--soft);font-size:17px}.streak b{color:var(--gold2)}
.view{animation:rise .35s ease}@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sanctuary{position:relative;min-height:380px;border:1px solid var(--line);border-radius:24px;overflow:hidden;background:linear-gradient(180deg,rgba(16,12,9,.40),rgba(8,6,5,.88)),radial-gradient(circle at 80% 34%,rgba(255,185,80,.20),transparent 18%),linear-gradient(115deg,#211810,#0b0909 50%,#130e13);box-shadow:0 24px 70px rgba(0,0,0,.55);margin-bottom:16px}
.sanctuary:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 0 10%,rgba(255,255,255,.03) 10% 10.6%,transparent 10.6% 22%,rgba(255,255,255,.04) 22% 22.8%,transparent 22.8% 100%),radial-gradient(circle at 72% 55%,rgba(255,148,56,.18),transparent 16%);opacity:.8}
.window{position:absolute;right:20px;top:66px;width:92px;height:148px;border:5px solid rgba(216,178,90,.42);border-radius:54px 54px 8px 8px;background:linear-gradient(180deg,#d99848,#3f2419 60%,#15100d);box-shadow:inset 0 0 30px rgba(255,255,255,.12),0 0 40px rgba(216,178,90,.12)}
.window:before{content:"";position:absolute;left:50%;top:0;bottom:0;border-left:2px solid rgba(216,178,90,.32)}.window:after{content:"";position:absolute;left:12px;right:12px;top:56%;border-top:2px solid rgba(216,178,90,.28)}
.fire{position:absolute;right:0;bottom:0;width:110px;height:145px;background:radial-gradient(circle at 70% 72%,rgba(247,132,47,.78),transparent 18%),radial-gradient(circle at 78% 85%,rgba(230,82,28,.75),transparent 24%);filter:blur(.2px);opacity:.9}.table{position:absolute;left:20px;bottom:28px;width:210px;height:50px;background:linear-gradient(180deg,#4a2d19,#20130c);border-radius:6px;box-shadow:0 16px 25px #0008}.table:before{content:"";position:absolute;left:18px;top:-38px;width:70px;height:28px;border:2px solid rgba(216,178,90,.28);border-radius:3px;background:rgba(239,228,206,.08)}.sword{position:absolute;left:108px;bottom:90px;width:8px;height:126px;background:linear-gradient(90deg,#95845f,#efe1b7,#6c5a36);transform:rotate(0deg);box-shadow:0 0 12px rgba(216,178,90,.22)}.sword:before{content:"";position:absolute;left:-18px;top:72px;width:44px;height:7px;background:#9b7a35;border-radius:4px}.sword:after{content:"";position:absolute;left:-7px;top:-18px;width:22px;height:22px;border:2px solid #d8b25a;transform:rotate(45deg);background:#17100c}
.mirror{position:absolute;left:50%;top:92px;transform:translateX(-50%);width:126px;height:205px;border:7px solid rgba(216,178,90,.36);border-radius:70px 70px 8px 8px;background:linear-gradient(160deg,rgba(255,255,255,.12),rgba(255,255,255,.02)),linear-gradient(180deg,#1b1a20,#090806);box-shadow:0 0 40px rgba(0,0,0,.55)}.mirror:before{content:"";position:absolute;left:36px;top:42px;width:54px;height:54px;border-radius:50%;background:#876344;box-shadow:0 64px 0 10px #4b3024, -28px 80px 0 -8px #8c684b,28px 80px 0 -8px #8c684b}.mirror:after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 0 45%,rgba(255,255,255,.10) 46% 48%,transparent 50%);border-radius:inherit}
.heroText{position:absolute;left:18px;right:18px;top:18px}.eyebrow{font-size:11px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase}.heroText h1{font-size:26px;margin-top:6px;line-height:1.1}.heroText p{font-size:15px;color:var(--soft);font-style:italic;line-height:1.35;margin-top:5px}.lumen{position:absolute;left:18px;right:18px;bottom:96px;background:rgba(12,8,8,.72);border:1px solid var(--line);border-radius:18px;padding:14px 16px;backdrop-filter:blur(10px)}.lumen b{display:block;color:var(--gold);letter-spacing:.22em;font-size:11px;margin-bottom:5px}.lumen span{font-size:16px;color:#efe6d2;line-height:1.36}
.quick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin:14px 0}.qbtn{min-height:72px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,rgba(216,178,90,.08),rgba(15,10,9,.86));color:var(--gold);font-size:21px}.qbtn span{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;margin-top:6px;color:var(--soft)}
.directive{background:linear-gradient(160deg,#1a1410,#100c14);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:16px}.dlabel,.sectitle{font-size:12px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin:14px 2px 10px}.dtext{font-size:20px;color:#f2e7d0;line-height:1.35;margin-bottom:6px}.dwhy{font-size:14px;font-style:italic;color:#b3a685;line-height:1.45}.trialhead{margin:8px 2px 14px}.tname{font-size:25px;color:#efe4cd}.tfocus{font-style:italic;color:var(--dim);font-size:15px;margin-top:2px}.exrow{display:flex;align-items:center;gap:12px;background:rgba(20,16,25,.92);border:1px solid var(--line);border-radius:18px;padding:15px 14px;margin-bottom:11px;box-shadow:0 10px 24px #0003}.exmain{flex:1}.exname{font-size:20px;color:#e8dcc0}.exmeta{font-size:14px;color:var(--dim);margin:2px 0 8px}.dots{display:flex;gap:6px}.dot{width:10px;height:10px;border-radius:50%;border:1.5px solid #5a4f3a}.dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(216,178,90,.35)}.exright{display:flex;flex-direction:column;align-items:flex-end;gap:9px}.weight{display:flex;align-items:center;gap:8px}.wbtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:#0f0b08;color:var(--gold);font-size:22px}.wval{font-size:18px;color:#e8dcc0;min-width:54px;text-align:center}.wval i{font-style:normal;font-size:11px;color:var(--dim);margin-left:2px}.logbtn,.hallbtn{padding:11px 16px;border-radius:12px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:700}.logbtn:disabled{opacity:.42;border-color:var(--dim);color:var(--dim)}.complete{width:100%;margin-top:10px;padding:17px;border-radius:16px;border:none;background:linear-gradient(180deg,#e6c884,#c39a34);color:#1a140a;font-weight:800;letter-spacing:.14em;font-size:14px;text-transform:uppercase}.donecard,.datacard,.reccard,.stat,.histrow{background:rgba(20,16,25,.92);border:1px solid var(--line);border-radius:16px}.donecard{padding:22px;text-align:center;color:#d7cbae;font-style:italic;font-size:17px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{padding:18px;text-align:center}.stat b{display:block;font-size:36px;color:var(--gold)}.stat span{font-size:13px;color:var(--dim)}.histrow{display:flex;justify-content:space-between;gap:8px;padding:12px 14px;margin-bottom:8px;font-size:13px;color:#c9bd9e}.empty{color:var(--dim);font-style:italic;padding:20px 4px}.reccard,.datacard{padding:15px 16px;margin-bottom:12px}.reccard label{display:flex;align-items:center;gap:12px;margin:11px 0;font-size:17px;color:#cdbf9c}.reccard input{flex:1;accent-color:var(--gold)}.reccard b{min-width:32px;text-align:right;color:var(--gold)}.logbtn.wide,.hallbtn{width:100%;display:block;text-align:center;text-decoration:none;margin-top:12px}.databtns{display:flex;gap:10px;margin-top:12px}.warn{color:#e0a24a;font-size:14px;line-height:1.4}.ok{color:var(--green);font-size:14px}.fine{font-size:13px;color:var(--dim);font-style:italic;margin-top:10px;line-height:1.5}.nav{position:fixed;left:0;right:0;bottom:0;z-index:10;display:flex;justify-content:center;gap:6px;padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);background:linear-gradient(transparent,#050403 32%);backdrop-filter:blur(10px)}.nb{flex:1;max-width:150px;padding:12px;border:none;background:transparent;color:var(--dim);font-size:12px;letter-spacing:.16em;text-transform:uppercase}.nb.on{color:var(--gold)}#toast{position:fixed;z-index:20;left:50%;bottom:calc(env(safe-area-inset-bottom) + 82px);transform:translateX(-50%) translateY(12px);background:#1a1410;border:1px solid var(--line);color:#e8dcc0;padding:12px 18px;border-radius:24px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;max-width:86vw;text-align:center}#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}#boot{position:fixed;inset:0;z-index:30;background:#030202;display:flex;align-items:center;justify-content:center;transition:opacity .7s;letter-spacing:.34em;color:var(--gold);font-size:21px}#boot.gone{opacity:0;pointer-events:none}.smallcaps{letter-spacing:.18em;text-transform:uppercase;color:var(--dim);font-size:11px}.install{margin-top:12px;color:#b7a783;font-size:14px;line-height:1.45}
@media(max-width:390px){.brand{font-size:19px}.exrow{padding:13px 12px}.exname{font-size:18px}.quick{gap:7px}.qbtn{min-height:64px}.sanctuary{min-height:360px}.mirror{transform:translateX(-50%) scale(.92)}}
</style>
</head>
<body>
<div id="app"></div><div id="toast"></div><div id="boot">ASCENSION</div>
<script type="module" src="./app.js"></script>
</body>
</html>
